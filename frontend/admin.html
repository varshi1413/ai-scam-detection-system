<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel | Scam Verification System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, sans-serif;
}

/* ===== NAVBAR ===== */
.navbar{
    background:#1e3a8a;
    color:white;
    padding:18px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar h1{
    font-size:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

.navbar img{
    width:28px;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-weight:500;
}

.navbar a:hover{
    text-decoration:underline;
}

/* ===== HERO ===== */
.hero{
    height:240px;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 5%;
}

/* ===== MAIN SECTION ===== */
.main-section{
    background:#f1f5f9;
    padding:70px 20px;
    display:flex;
    justify-content:center;
}

.admin-card{
    width:700px;
    background:white;
    padding:45px;
    border-radius:18px;
    box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.admin-card h2{
    text-align:center;
    margin-bottom:30px;
    color:#1e3a8a;
}

/* ===== LIST ===== */
ul{
    list-style:none;
}

li{
    margin:12px 0;
    padding:15px 18px;
    background:#f8fafc;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.2s;
}

li:hover{
    background:#e2e8f0;
}

button{
    padding:8px 16px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e40af;
}

#message{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

/* ===== FOOTER ===== */
.footer{
    background:#0f172a;
    color:#e2e8f0;
    text-align:center;
    padding:22px;
    font-size:14px;
}
.footer p{
    margin:4px 0;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>
        Admin Control Panel
    </h1>
    <a href="index.html">Back to Menu</a>
</div>

<!-- HERO -->
<div class="hero">
    <img src="img/community-banner.png">
</div>

<!-- MAIN CONTENT -->
<div class="main-section">
    <div class="admin-card">
        <h2>Pending Student Approvals</h2>
        <div id="adminList">Loading...</div>
        <div id="message"></div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 Scam Verification System</p>
    <p>AI-Powered | Community Driven | Secure Administration</p>
</div>

<script src="js/app.js"></script>
<script>

// 🔐 Get admin session info
const userRole = localStorage.getItem("userRole");
const userInstitution = localStorage.getItem("userInstitution");
const userId = localStorage.getItem("userId");

// 🚨 Protect admin page
if (userRole !== "admin") {
    alert("Unauthorized access");
    window.location.href = "index.html";
}

// 🔍 Load pending students
async function loadPending() {

    try {
        const students = await getJSON(`/admin/pending/${userInstitution}`);

        if (!students || students.length === 0) {
            document.getElementById("adminList").innerHTML =
                "<p>No pending students for your institution</p>";
            return;
        }

        let html = "<ul>";
        for (const s of students) {
            html += `<li>
                <span>${s.name} (${s.email})</span>
                <button onclick="approve(${s.id})">Approve</button>
            </li>`;
        }
        html += "</ul>";

        document.getElementById("adminList").innerHTML = html;

    } catch (err) {
        document.getElementById("adminList").innerHTML =
            "<p>Error loading students</p>";
    }
}

// ✅ Approve student
async function approve(student_id) {
    try {
        const data = await postJSON(`/admin/approve/${student_id}`, { role: "admin" });

        const msg = document.getElementById("message");
        msg.style.color = "green";
        msg.textContent = data.message || "Student approved successfully";

        loadPending();

    } catch (err) {
        const msg = document.getElementById("message");
        msg.style.color = "red";
        msg.textContent = "Error approving student.";
    }
}

// 🔄 Load on page open
loadPending();

</script>

</body>
</html>
