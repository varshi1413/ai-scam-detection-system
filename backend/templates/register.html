<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | Scam Verification System</title>
<link rel="icon" href="img/email.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, sans-serif;
}

/* ===== BODY ===== */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f1f5f9;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        linear-gradient(120deg, rgba(37,99,235,0.05) 25%, transparent 25%) -50px 0,
        linear-gradient(300deg, rgba(37,99,235,0.05) 25%, transparent 25%);
    background-size:100px 100px;
}

/* ===== TOP TITLE ===== */
.project-title{
    position:absolute;
    top:40px;
    text-align:center;
    z-index:1;
}

.project-title img{
    width:40px;
    margin-bottom:8px;
}

.project-title h1{
    font-size:22px;
    color:#1e3a8a;
    font-weight:700;
}

/* ===== REGISTER CARD ===== */
.register-container{
    width:420px;
    background:rgba(255,255,255,0.95);
    padding:50px;
    border-radius:25px;
    box-shadow:0 30px 60px rgba(0,0,0,0.4);
    text-align:center;
    position:relative;
    z-index:1;
}

.register-container h2{
    font-size:2rem;
    margin-bottom:25px;
    color:#1e3a8a;
}

/* ===== INPUTS ===== */
input, select{
    width:100%;
    padding:16px;
    margin:12px 0;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:15px;
    transition:0.3s;
}

input:focus, select:focus{
    border-color:#2563eb;
    box-shadow:0 0 6px rgba(37,99,235,0.5);
    outline:none;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:16px;
    margin-top:20px;
    border:none;
    border-radius:35px;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* ===== MESSAGE ===== */
#registerMsg{
    margin-top:18px;
    font-size:14px;
    font-weight:bold;
}

.error{ color:#dc2626; }
.success{ color:#059669; }

/* ===== LOGIN LINK ===== */
.login-link{
    margin-top:22px;
    display:block;
    font-size:14px;
    color:#2563eb;
    cursor:pointer;
    font-weight:600;
}

.login-link:hover{
    text-decoration:underline;
}

/* ===== FOOTER ===== */
.footer{
    position:absolute;
    bottom:0;
    width:100%;
    background:#0f172a;
    color:#e2e8f0;
    text-align:center;
    padding:18px 10px;
    font-size:13px;
}
.footer p{
    margin:4px 0;
}
</style>
</head>

<body>

<div class="register-container">
    <h2>Create Account</h2>

    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email" type="email">
    <input id="password" placeholder="Password" type="password">

    <select id="institution">
        <option value="">Select Institution</option>
        <option value="ABC College">ABC College</option>
        <option value="XYZ University">XYZ University</option>
    </select>

    <button id="registerBtn">Register</button>

    <div id="registerMsg"></div>

    <span class="login-link" onclick="window.location.href='index.html'">
        Already have an account? Log in
    </span>
</div>

<div class="footer">
    <p>© 2026 Scam Verification System</p>
    <p>AI-Powered | Community Driven | Secure Authentication</p>
</div>

<script src="js/app.js"></script>

<script>
document.getElementById("registerBtn").onclick = async () => {

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const institution = document.getElementById("institution").value;
    const messageBox = document.getElementById("registerMsg");

    messageBox.innerHTML = "";

    if (!name || !email || !password || !institution) {
        messageBox.innerHTML = "<span class='error'>All fields are required.</span>";
        return;
    }

    try {
        const data = await postJSON("/register", {
            name,
            email,
            password,
            institution
        });

        if (data.error) {
            messageBox.innerHTML = "<span class='error'>" + data.error + "</span>";
        } else {
            messageBox.innerHTML = "<span class='success'>" + data.message + "</span>";

            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
            document.getElementById("institution").value = "";
        }

    } catch (err) {
        messageBox.innerHTML = "<span class='error'>Could not connect to backend.</span>";
    }
};
</script>

</body>
</html>
