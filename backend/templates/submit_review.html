<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Company Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #4A90E2, #50E3C2);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        background: #fff;
        padding: 30px 40px;
        border-radius: 15px;
        width: 450px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        transition: transform 0.3s ease;
    }

    .container:hover {
        transform: translateY(-5px);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #4A90E2;
    }

    label {
        font-weight: 600;
        margin-top: 12px;
        display: block;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
        width: 100%;
        padding: 10px 12px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }

    input:focus, textarea:focus, select:focus {
        border-color: #4A90E2;
        box-shadow: 0 0 8px rgba(74,144,226,0.3);
        outline: none;
    }

    .radio-group {
        display: flex;
        gap: 20px;
        margin-top: 5px;
    }

    .radio-group label {
        font-weight: normal;
    }

    .star-rating {
        display: flex;
        gap: 5px;
        margin-top: 5px;
    }

    .star {
        font-size: 24px;
        cursor: pointer;
        color: #ccc;
        transition: color 0.2s;
    }

    .star.selected,
    .star.hover {
        color: #FFD700;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: linear-gradient(90deg, #4A90E2, #6A5ACD);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.02);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    #message {
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
        color: green;
    }

    .fee-amount-container {
        display: none;
        margin-top: 5px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Submit Company Review</h2>

    <!-- Company / LinkedIn -->
    <label>Company Name</label>
    <input type="text" id="company_name" placeholder="Enter Company Name">

    <label>LinkedIn Company URL</label>
    <input type="text" id="linkedin_url" placeholder="https://linkedin.com/company/...">

    <!-- Role -->
    <label>Role</label>
    <select id="role">
        <option value="">Select Role</option>
        <option value="Data Scientist">Data Scientist</option>
        <option value="Software Engineer">Software Engineer</option>
        <option value="Intern">Intern</option>
        <option value="Other">Other</option>
    </select>

    <!-- Description -->
    <label>Description</label>
    <textarea id="description" rows="4" placeholder="Enter offer or experience description"></textarea>

    <!-- Fee Asked -->
    <label>Fee Asked?</label>
    <div class="radio-group">
        <label><input type="radio" name="fee_asked" value="Yes"> Yes</label>
        <label><input type="radio" name="fee_asked" value="No"> No</label>
    </div>

    <!-- Fee Amount -->
    <div class="fee-amount-container">
        <label>Fee Amount</label>
        <input type="number" id="fee_amount" placeholder="Enter fee amount">
    </div>

    <!-- Contact Method -->
    <label>Contact Method</label>
    <select id="contact_method">
        <option value="">Select Contact Method</option>
        <option value="Email">Email</option>
        <option value="WhatsApp">WhatsApp</option>
        <option value="Phone">Phone</option>
        <option value="Other">Other</option>
    </select>

    <!-- Rating -->
    <label>Rating</label>
    <div class="star-rating" id="ratingStars">
        <span class="star" data-value="1">&#9733;</span>
        <span class="star" data-value="2">&#9733;</span>
        <span class="star" data-value="3">&#9733;</span>
        <span class="star" data-value="4">&#9733;</span>
        <span class="star" data-value="5">&#9733;</span>
    </div>

    <button onclick="submitReview()">Submit Review</button>
    <div id="message"></div>
</div>

<script>
let selectedRating = 0;
const stars = document.querySelectorAll('.star');
stars.forEach(star => {
    star.addEventListener('click', () => {
        selectedRating = star.dataset.value;
        updateStars(selectedRating);
    });
    star.addEventListener('mouseover', () => {
        updateStars(star.dataset.value, true);
    });
    star.addEventListener('mouseout', () => {
        updateStars(selectedRating);
    });
});

function updateStars(rating, hover = false){
    stars.forEach(star => {
        star.classList.remove('selected', 'hover');
        if(star.dataset.value <= rating){
            star.classList.add(hover ? 'hover' : 'selected');
        }
    });
}

// Show fee amount only if "Yes" selected
document.querySelectorAll('input[name="fee_asked"]').forEach(radio => {
    radio.addEventListener('change', () => {
        const feeContainer = document.querySelector('.fee-amount-container');
        if(radio.value === "Yes"){
            feeContainer.style.display = "block";
        } else {
            feeContainer.style.display = "none";
        }
    });
});

function extractCompanyFromLinkedIn(url) {
    const match = url.match(/linkedin\.com\/company\/([^\/]+)/);
    if (!match) return null;
    return match[1].replace(/-/g, " ").replace(/\b\w/g, l => l.toUpperCase());
}

async function submitReview() {
    const company_name = document.getElementById("company_name").value.trim();
    const linkedin_url = document.getElementById("linkedin_url").value.trim();
    const role = document.getElementById("role").value;
    const description = document.getElementById("description").value.trim();
    const fee_asked = document.querySelector('input[name="fee_asked"]:checked')?.value;
    const fee_amount = document.getElementById("fee_amount").value.trim();
    const contact_method = document.getElementById("contact_method").value;
    const rating = selectedRating;

    if(!company_name && !linkedin_url){
        alert("Enter Company Name or LinkedIn URL");
        return;
    }
    if(!role){ alert("Select Role"); return; }
    if(!description){ alert("Enter Description"); return; }
    if(!fee_asked){ alert("Select Fee Asked"); return; }
    if(fee_asked === "Yes" && !fee_amount){ alert("Enter Fee Amount"); return; }
    if(!contact_method){ alert("Select Contact Method"); return; }
    if(!rating){ alert("Select Rating"); return; }

    let body = { company_name, linkedin_url, role, description, fee_asked, contact_method, rating };
    if(fee_asked === "Yes"){ body.fee_amount = fee_amount; }

    try {
        const response = await fetch("http://127.0.0.1:5000/submit_review", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });

        const data = await response.json();
        document.getElementById("message").innerText = data.message || data.error;
    } catch(e){
        document.getElementById("message").innerText = "Error submitting review";
    }
}
</script>

</body>
</html>
