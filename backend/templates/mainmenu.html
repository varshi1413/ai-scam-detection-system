<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Menu | Scam Verification System</title>
    <link rel="icon" href="img/email.png">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI", sans-serif;
        }

        body{
            background:url("img/g.jpg") no-repeat center center fixed;
            background-size:cover;
            min-height:100vh;
            color:white;
            overflow-x:hidden;
            position:relative;
        }

        /* ================= FLOATING BUBBLES ================= */
        .particles{
            position:fixed;
            inset:0;
            pointer-events:none;
            z-index:0;
        }

        .particles span{
            position:absolute;
            bottom:-60px;
            border-radius:50%;
            background:rgba(255,255,255,0.9);
            box-shadow:
                0 0 15px rgba(255,255,255,0.9),
                0 0 30px rgba(96,165,250,0.6);
            animation:bubbleFloat linear infinite;
        }


        /* ================= LOGOUT ================= */
        .logout{
            position:absolute;
            top:20px;
            right:30px;
            font-size:18px;
            text-decoration:none;
            color:white;
            font-weight:bold;
            z-index:5;
            text-shadow:0 4px 15px rgba(0,0,0,0.9);
        }

        .logout:hover{
            text-decoration:underline;
        }

        /* ================= MAIN MENU ================= */
        .menu-container{
            max-width:1000px;
            margin:120px auto;
            text-align:center;
            position:relative;
            z-index:2;
        }

        h1{
            font-size:46px;
            margin-bottom:10px;
            text-shadow:0 6px 20px rgba(0,0,0,0.9);
        }

        h2{
            font-size:28px;
            margin-bottom:60px;
            color:#e0f2fe;
            text-shadow:0 4px 15px rgba(0,0,0,0.85);
        }

        /* ================= BUTTONS ================= */
        .menu-button{
            width:520px;
            padding:28px;
            font-size:24px;
            font-weight:bold;
            border:none;
            border-radius:50px;
            cursor:pointer;
            margin-bottom:60px;
            transition:transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow:0 20px 40px rgba(0,0,0,0.45);
        }

        /* Pastel Blue */
        .check-btn{
            background:#6ECBFF;
            color:#002B5B;
        }

        /* Pastel Pink */
        .review-btn{
            background:#FF9AA2;
            color:#5A0000;
        }

        /* Soft Purple */
        .community-btn{
            background:#CDB4DB;
            color:#3A0CA3;
        }

        .menu-button:hover{
            transform:scale(1.1);
            box-shadow:0 25px 50px rgba(0,0,0,0.6);
            animation:bounce 0.5s;
        }

        @keyframes bounce{
            0%{transform:translateY(0)}
            30%{transform:translateY(-8px)}
            60%{transform:translateY(4px)}
            100%{transform:translateY(0)}
        }

        /* Responsive */
        @media(max-width:600px){
            .menu-button{
                width:90%;
                font-size:20px;
                padding:22px;
            }
            h1{font-size:34px;}
            h2{font-size:22px;}
        }
    </style>
</head>

<body>

<!-- FLOATING BUBBLES -->
<div class="particles">
    <span style="left:5%; width:16px; height:16px; animation-duration:18s;"></span>
    <span style="left:15%; width:26px; height:26px; animation-duration:24s;"></span>
    <span style="left:30%; width:14px; height:14px; animation-duration:16s;"></span>
    <span style="left:45%; width:22px; height:22px; animation-duration:21s;"></span>
    <span style="left:60%; width:30px; height:30px; animation-duration:28s;"></span>
    <span style="left:75%; width:18px; height:18px; animation-duration:19s;"></span>
    <span style="left:90%; width:24px; height:24px; animation-duration:23s;"></span>
</div>

<a href="login.html" class="logout">Logout</a>

<div class="menu-container">
    <h1>Welcome 👋</h1>
    <h2>Choose what you'd like to do</h2>

    <button class="menu-button check-btn"
        onclick="location.href='dashboard.html'">
        Check Offer 🔍
    </button>

    <button class="menu-button review-btn"
        onclick="location.href='submit_review.html'">
        Submit Review ✍️
    </button>

    <button class="menu-button community-btn"
        onclick="location.href='community.html'">
        Community Summary 📊
    </button>
</div>

</body>
</html>
